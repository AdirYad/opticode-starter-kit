name: Migrate production database

# Apply pending Drizzle migrations to production whenever the schema or
# migration files change on master. drizzle-kit records what it has applied,
# so this is idempotent and a no-op when nothing is pending.
#
# One-time setup: add a DATABASE_URL repository secret pointing at production
# (Settings, Secrets and variables, Actions).

on:
  push:
    branches: [master]
    paths:
      - "drizzle/**"
      - "src/db/schema.ts"
      - "drizzle.config.ts"
      - ".github/workflows/migrate.yml"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
